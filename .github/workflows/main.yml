on:
  push:
    branches: [ main ]
name: 🚀 Deploy file on ResearchChair--FTP
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v2

    - name: Use Node.js 14
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@4.2.0
      with:
        server: ${{ secrets.ADNAN_CPANEL_HOST }}
        username: ${{ secrets.ADNAN_CPANEL_USERNAME }}
        password: ${{ secrets.ADNAN_CPANEL_PASSWORD }}
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/public/
          **/storage/**         
            **/.env
            **/storage/logs/**
            **/vendor/**
